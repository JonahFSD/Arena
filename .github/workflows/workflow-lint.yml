# actionlint — catches unsafe workflow patterns (script injection from
# PR titles, unescaped shell variables, undeclared inputs, wrong
# context references, `pull_request_target` with arbitrary user code).
#
# Treating CI configuration as production code per
# docs/GOOD-CODE.md §6. Runs whenever a workflow file changes.

name: Workflow Lint

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actionlint.yaml"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actionlint.yaml"

concurrency:
  group: workflow-lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          reporter: github-pr-check
          fail_level: error
