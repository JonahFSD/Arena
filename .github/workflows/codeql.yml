# CodeQL — GitHub's SAST engine. Free for public repos. Covers
# the JS/TS class of bugs `tsc` doesn't: prototype pollution,
# unsafe deserialization, regex DoS, hardcoded credentials, unsafe
# redirects, SSRF, command injection, path traversal.
#
# Runs on every PR + every push to main, plus a weekly scheduled
# scan that catches new query updates landing against the existing
# codebase without consuming CI minutes per-PR.
#
# Per docs/GOOD-CODE.md §14 — this is a security gate; do not flip
# to advisory.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Monday 07:23 UTC. Off-peak; offset 23 minutes so we don't
    # land on a top-of-hour spike.
    - cron: "23 7 * * 1"

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      # Required for uploading CodeQL results to the Security tab.
      security-events: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        with:
          category: "/language:${{ matrix.language }}"
