# CI — runs on every PR to main and on pushes to main.
#
# Three parallel jobs (lint, typecheck, build). Target p95 < 10min total
# wallclock; current expected is ~90s with the npm cache warm.
#
# Conventions enforced here per docs/GOOD-CODE.md:
#   §10 — public queries are tested at the type level via tsc
#   §12 — `npm run build:ci` runs `next build` only. The Convex deploy
#         step is gated to VERCEL_ENV=production in vercel.json so a
#         preview-branch build never overwrites prod functions, and
#         likewise CI never deploys.
#   §14 — this file IS the gate referenced by rule 14.
#
# Third-party actions are pinned by full-length commit SHA per the
# tj-actions/changed-files compromise (Mar 2025). Comments record the
# corresponding tag so renovate/dependabot bumps are reviewable.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same branch — saves CI minutes and
# gives faster feedback on the latest push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: read-only by default. Individual jobs that need
# more (e.g. a future deploy job writing a deployment status) must
# opt in explicitly.
permissions:
  contents: read

jobs:
  lint:
    name: Lint (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Advisory until the pre-existing lint baseline is cleared. As of
    # the CI rollout there are 25 errors (mostly `@typescript-eslint/
    # no-explicit-any` and React Compiler strict-mode complaints) and
    # 46 warnings. Gating on lint right now would block every PR; per
    # docs/GOOD-CODE.md principle 8 (quarantine with attribution),
    # explicitly accept the baseline and surface new regressions via
    # the job result while not blocking merges. Flip this to a hard
    # gate by removing `continue-on-error` once the baseline is zero.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: TypeScript
        run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Next.js statically resolves NEXT_PUBLIC_* during the build. The
      # ConvexReactClient is constructed lazily at runtime so any
      # well-formed URL works here — CI is not exercising the network,
      # only verifying that `next build` succeeds.
      NEXT_PUBLIC_CONVEX_URL: https://ci-placeholder.convex.cloud
      NEXT_PUBLIC_CONVEX_SITE_URL: https://ci-placeholder.convex.site
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Next build (no Convex deploy)
        run: npm run build:ci

  convex-preview:
    name: Convex preview deploy (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skip for PRs from forks — GitHub doesn't pass secrets to fork
    # PRs, so the deploy key would be empty and the job would fail
    # uselessly. Pushes to main have no head_repo and the OR is true.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    # Advisory until CONVEX_DEPLOY_KEY is wired as a repo secret.
    # Generate via Convex dashboard:
    #   Project Settings -> Deploy Keys -> Generate preview deploy key
    # Then add as repo secret CONVEX_DEPLOY_KEY and flip this flag.
    # Preview deployments auto-clean after 5 days on the free tier
    # (14 days on paid tiers); free-tier project limit applies.
    #
    # What this catches that tsc + next build can't:
    #   - Schema validator changes that don't match existing data
    #     (we hit this twice in the security review work — bqType
    #     migration and the storage validator widening).
    #   - Convex function args / validator drift from the schema.
    #   - Runtime errors that surface during `convex deploy`'s push.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Convex preview deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        # When CONVEX_DEPLOY_KEY is a preview-class key, the Convex
        # CLI auto-derives the preview name from GitHub Actions env
        # vars (no flag needed). If the secret isn't wired yet, skip
        # cleanly instead of failing with the unhelpful "developing
        # anonymously with a locally running project" message that
        # `npx convex deploy` produces when it sees no credentials.
        run: |
          if [ -z "$CONVEX_DEPLOY_KEY" ]; then
            echo "::notice title=Convex preview deploy skipped::CONVEX_DEPLOY_KEY secret is not set."
            echo
            echo "To enable preview deploys:"
            echo "  1. Convex Dashboard -> Project Settings -> Deploy Keys"
            echo "  2. Generate a preview deploy key"
            echo "  3. Add as repo secret named CONVEX_DEPLOY_KEY"
            echo
            echo "This job will then push a per-branch preview deployment"
            echo "of the Convex backend on every PR."
            exit 0
          fi
          npx convex deploy
